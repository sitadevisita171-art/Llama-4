<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Llama-4 AdMob Video Player</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 0;
    }
    #video-container {
      width: 80%;
      margin: 20px auto;
      background: #111;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }
    #video-player {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    #ad-container {
      margin-top: 10px;
      padding: 10px;
      background: #222;
      border-radius: 8px;
    }
    h1 {
      color: #00ff00;
      text-shadow: 0 0 5px #00ff00;
    }
  </style>
</head>
<body>
  <h1>Llama-4 AdMob Video Player</h1>
  <div id="video-container">
    <video id="video-player" controls>
      <source src="video.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div id="ad-container">
      <!-- AdMob ad will load here -->
    </div>
  </div>
